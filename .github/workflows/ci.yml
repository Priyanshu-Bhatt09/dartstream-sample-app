name: ci

on:
  push:
  pull_request:

jobs:
  analyze-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.12.1
      - name: Pub get
        run: dart pub get
      - name: Analyze root
        run: dart analyze bin

  analyze-flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true
      - name: Pub get
        run: flutter pub get
      - name: Analyze flutter client
        run: flutter analyze
